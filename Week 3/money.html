<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Bank System</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input{
            padding: 10px;
            width: 250px;
        }

        button{
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        .eye{
            cursor: pointer;
            font-size: 30px;
            margin-left: 10px;
        }

    </style>
</head>
<body>

    <h1>Simple Bank System</h1>

    <h2>
        Bank Balance: Rs.
        <span id="balance">******</span>

        <!-- Monkey icon -->
        <span class="eye" id="eyeIcon">🙈</span>
    </h2>

    <button id="depositBtn">Deposit</button>
    <button id="withdrawBtn">Withdraw</button>

    <br><br>

    <!-- Deposit Box -->
    <div id="depositBox" style="display:none;">

        <input type="number"
        id="num1"
        placeholder="Enter amount to Deposit">

        <br><br>

        <button id="confirmDeposit">
            Confirm Deposit
        </button>

    </div>

    <!-- Withdraw Box -->
    <div id="withdrawBox" style="display:none;">

        <input type="number"
        id="num2"
        placeholder="Enter amount to Withdraw">

        <br><br>

        <button id="confirmWithdraw">
            Confirm Withdraw
        </button>

    </div>

    <script src="money.js"></script>

</body>
</html>
